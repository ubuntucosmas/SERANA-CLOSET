<body class="bg-surface text-on-surface antialiased">

    <!-- SideNavBar (Authority: JSON) -->

        <div class="px-6 mb-10">
            <h2 class="font-serif text-xl text-stone-900 dark:text-stone-100 tracking-tight">Admin Suite</h2>
            <p class="font-sans manrope uppercase tracking-widest text-[10px] text-stone-500 mt-1">Management Portal</p>
        </div>

        <nav class="flex-1 px-4 space-y-1">

                <p class="text-3xl font-headline font-bold text-on-surface">842</p>
            </div>
            <div class="bg-surface-container-lowest p-6 rounded border border-outline-variant/10 shadow-sm">
                <p class="font-label text-[10px] uppercase tracking-widest text-secondary mb-1">Gents' Collection</p>
                <p class="text-3xl font-headline font-bold text-on-surface">312</p>
            </div>
            <div class="bg-surface-container-lowest p-6 rounded border border-outline-variant/10 shadow-sm">
                <p class="font-label text-[10px] uppercase tracking-widest text-secondary mb-1">Custom Orders</p>
                <p class="text-3xl font-headline font-bold text-on-surface">94</p>
            </div>
        </div>

                                <th class="px-6 py-4 font-semibold">Category</th>
                                <th class="px-6 py-4 font-semibold">Price</th>
                                <th class="px-6 py-4 font-semibold">Custom</th>
                                <th class="px-6 py-4 font-semibold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-outline-variant/10">

                                        </div>
                                    </div>
                                </td>

                                <td class="px-6 py-4 text-sm font-body">$850.00</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 bg-primary/10 text-primary text-[9px] font-bold uppercase tracking-widest rounded-full">Available</span>
                                </td>
                                <td class="px-6 py-4 text-right space-x-3">
                                    <button class="text-secondary hover:text-primary transition-colors"><span class="material-symbols-outlined text-lg">edit</span></button>
                                    <button class="text-secondary hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">delete</span></button>
                                </td>

                                            <img src="https://images.unsplash.com/photo-1594932224828-b4b059b6ff0f?q=80&w=128&h=160&auto=format&fit=crop" data-alt="tailored bespoke men's blazer in deep navy wool on a designer hanger with cinematic lighting" class="w-full h-full object-cover">
                                        </div>
                                        <div>
                                            <p class="text-sm font-bold text-on-surface group-hover:text-primary transition-colors">Savile Row Navy Blazer</p>
                                            <p class="text-[10px] text-secondary uppercase tracking-tighter">SKU: SER-2024-NB05</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-[10px] uppercase tracking-widest font-label">Gents</td>
                                <td class="px-6 py-4 text-sm font-body">$1,200.00</td>
                                <td class="px-6 py-4">
                                    <span class="px-2 py-1 bg-surface-container-high text-secondary text-[9px] font-bold uppercase tracking-widest rounded-full">No</span>
                                </td>
                                <td class="px-6 py-4 text-right space-x-3">
                                    <button class="text-secondary hover:text-primary transition-colors"><span class="material-symbols-outlined text-lg">edit</span></button>
                                    <button class="text-secondary hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">delete</span></button>
                                </td>
                            </tr>
                            <!-- Row 3 -->
                            <tr class="hover:bg-surface-container-low/30 transition-colors group">

                                        </div>
                                        <div>
                                            <p class="text-sm font-bold text-on-surface group-hover:text-primary transition-colors">Tonal Linen Summer Shirt</p>
                                            <p class="text-[10px] text-secondary uppercase tracking-tighter">SKU: SER-2024-LS03</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-6 py-4 text-[10px] uppercase tracking-widest font-label">Ladies</td>
                                <td class="px-6 py-4 text-sm font-body">$240.00</td>
                                <td class="px-6 py-4">

                                </td>
                                <td class="px-6 py-4 text-right space-x-3">

                                    <button class="text-secondary hover:text-error transition-colors"><span class="material-symbols-outlined text-lg">delete</span></button>

                    <form class="space-y-6">
                        <!-- Image Upload Mockup -->
                        <div class="group relative aspect-[3/4] w-full bg-surface-container flex flex-col items-center justify-center border-2 border-dashed border-outline-variant/40 rounded hover:border-primary/50 transition-all cursor-pointer overflow-hidden">
                            <span class="material-symbols-outlined text-3xl text-outline mb-2 group-hover:scale-110 transition-transform">add_a_photo</span>
                            <span class="font-label text-[10px] uppercase tracking-widest text-secondary">Upload High-Res Shot</span>
                        </div>

                        <div>
                            <label class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-2">Title</label>
                            <input type="text" placeholder="e.g. Victorian Lace Bodice" class="w-full bg-surface-container-lowest border-none rounded p-3 text-sm focus:ring-1 focus:ring-primary placeholder:text-outline/50 transition-all">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-2">Price ($)</label>
                                <input type="number" placeholder="0.00" class="w-full bg-surface-container-lowest border-none rounded p-3 text-sm focus:ring-1 focus:ring-primary placeholder:text-outline/50 transition-all">
                            </div>
                            <div>
                                <label class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-2">Category</label>
                                <select class="w-full bg-surface-container-lowest border-none rounded p-3 text-sm focus:ring-1 focus:ring-primary appearance-none transition-all">
                                    <option>Ladies</option>
                                    <option>Gents</option>
                                    <option>Custom</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-2">Description</label>
                            <textarea rows="4" placeholder="Articulate the craft and material..." class="w-full bg-surface-container-lowest border-none rounded p-3 text-sm focus:ring-1 focus:ring-primary placeholder:text-outline/50 transition-all resize-none"></textarea>
                        </div>

                        <div class="flex items-center justify-between py-2">
                            <span class="font-label text-[10px] uppercase tracking-widest text-on-surface">Custom Option Available</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" value="" class="sr-only peer">
                                <div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
                            </label>
                        </div>

                        <button type="submit" class="w-full py-4 bg-gradient-to-tr from-primary to-primary-container text-white font-label text-xs uppercase tracking-[0.2em] rounded shadow-xl shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all">

            <div class="h-px w-24 bg-primary/30 mt-2"></div>
        </div>
        
        <div class="flex gap-12 font-sans manrope text-[10px] tracking-[0.15em] uppercase">
            <a href="#" class="text-stone-500 hover:text-yellow-500 transition-colors">Terms of Service</a>
            <a href="#" class="text-stone-500 hover:text-yellow-500 transition-colors">Privacy Policy</a>
            <a href="#" class="text-stone-500 hover:text-yellow-500 transition-colors">Contact WhatsApp</a>

        <div class="text-stone-600 font-sans manrope text-[9px] tracking-widest uppercase">
            © 2024 SERANA CLOSET. BEYOND THE WARDROBE.
        </div>
